name: Release

# Builds the Android app package when a version tag is pushed, and attaches the
# artifacts to a GitHub Release. Tag with: git tag v0.1.0 && git push --tags
#
# DORMANT UNTIL TAGGED: only runs on v* tags, which won't be pushed until the
# Gradle project exists. Builds an UNSIGNED release by default — add a signing
# keystore (base64) + passwords as repo secrets and a signingConfig before any
# Play Store upload.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK + AAB
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inventory-android-${{ github.ref_name }}
          path: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/build/outputs/apk/release/*.apk
            **/build/outputs/bundle/release/*.aab
          generate_release_notes: true
