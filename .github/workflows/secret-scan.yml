name: Secret scan

# Serialize scans per ref but NEVER cancel one in flight — a secret scan is a
# security gate, so every pushed commit must be fully scanned; cancelling an
# in-flight scan on a rapid follow-up push could skip an intermediate commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Catches accidentally-committed secrets (keystores, signing passwords, API keys,
# google-services.json values, tokens). Runs on every push to main + every PR.
# Cheap and safe on any content, so it is ACTIVE immediately (not dormant).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
