name: CI

# Supersede an in-flight run when a newer commit lands on the same ref, so
# rapid pushes/PR updates don't stack redundant (and, for the emulator/MySQL
# jobs, expensive) runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Compile + style + lint + unit tests for the Android client.
#
# Style gating (ktlint + detekt) runs against committed baselines in app/ —
# it fails only on NEW violations. Android lint stays reported but non-fatal
# (see app/build.gradle.kts).

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '**/*.kt'
      - '**/*.kts'
      - '**/build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradle.properties'
      # Run the suite when the workflow itself changes, so CI edits are validated.
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'app/**'
      - '**/*.kt'
      - '**/*.kts'
      - '**/build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradle.properties'
      # Run the suite when the workflow itself changes, so CI edits are validated.
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Verify the committed gradle-wrapper.jar matches a known-good Gradle
      # release checksum (it was fetched from Gradle's official release tag).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Style gate (ktlint + detekt, baseline-aware)
        run: ./gradlew ktlintCheck detekt

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Android lint
        run: ./gradlew lint

      # The debug build signs with a keystore restored from a secret. Fork PRs run
      # without secrets, so the APK steps below are gated on the secret being present
      # — a fork PR still gets unit tests + lint (the real gates) and goes green,
      # instead of red-failing on missing signing infra it can never have.
      - name: Check for signing secret
        id: signing
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_B64" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false — skipping APK build (fork PR / no secret)"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore debug keystore
        if: steps.signing.outputs.available == 'true'
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > ~/.android/inventory-debug.jks

      - name: Build debug APK
        if: steps.signing.outputs.available == 'true'
        run: ./gradlew assembleDebug
        env:
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}

      - name: Upload debug APK (preview)
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-preview
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
