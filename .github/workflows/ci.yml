name: CI

# Compile + lint + unit tests for the Android client.
#
# Activated now that the Gradle project exists. ktlint/detekt style gating will
# be added in a later pass; for now CI gates on a clean compile + unit tests,
# with Android lint reported but non-fatal (see app/build.gradle.kts).

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '**/*.kt'
      - '**/*.kts'
      - '**/build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradle.properties'
  pull_request:
    paths:
      - 'app/**'
      - '**/*.kt'
      - '**/*.kts'
      - '**/build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradle.properties'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify the committed gradle-wrapper.jar matches a known-good Gradle
      # release checksum (it was fetched from Gradle's official release tag).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Android lint
        run: ./gradlew lint
