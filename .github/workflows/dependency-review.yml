name: Dependency review

# Supersede an in-flight run when a newer commit lands on the same ref, so
# rapid pushes/PR updates don't stack redundant (and, for the emulator/MySQL
# jobs, expensive) runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Flags dependency changes that introduce known-vulnerable Gradle/Maven
# artifacts on a PR. GitHub-native; needs a base ref to diff, so PR-only.
# No-op until the Gradle project declares dependencies.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dependency Review needs the repo's Dependency Graph (GitHub Advanced
      # Security on private repos) enabled; without it the action hard-errors
      # "not supported on this repository" and red-fails every PR on infra, not
      # code (same class as the fork-PR signing red fixed in T17). Tolerate that
      # so the check doesn't block PRs; once a maintainer enables the Dependency
      # Graph in Settings → Security, real high-severity findings surface here.
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high
