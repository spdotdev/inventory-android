name: Dependency review

# Flags newly introduced dependencies with known vulnerabilities or
# incompatible licenses on a PR diff, before they land on main. Complements
# Dependabot (dependabot.yml, keeps existing deps patched) by gating new
# additions at review time.

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
