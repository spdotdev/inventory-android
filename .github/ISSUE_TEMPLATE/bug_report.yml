name: 🐞 Bug report
description: Something in the app is broken, wrong, or crashed.
title: "[Bug] "
labels: ["bug", "from-tester"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing! The more of this you fill in, the less likely we
        have to come back and ask you to reproduce it again.

        **The single most useful thing you can add is a screenshot.**

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem in your own words.
      placeholder: I tapped the Search tab and nothing happened at all.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How do we make it happen again?
      description: |
        Step by step, from opening the app. Even if it feels obvious — the
        exact order often turns out to be the thing that matters.
      placeholder: |
        1. Open the app (already signed in)
        2. Tap the Storage tab at the bottom
        3. Tap the "Fridge" card
        4. Tap the ⚙️ in the top right
        5. Screen goes blank
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
      placeholder: I expected the Settings screen to open.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or screen recording
      description: |
        **Required.** Drag an image or video straight into this box, or tap
        it and pick from your gallery.

        On Android: hold **Power + Volume Down** for a screenshot. For a
        recording, swipe down twice and tap **Screen record**.

        If the app crashed and closed before you could capture it, write
        "crashed, no screenshot" here and tell us exactly what you were doing
        in the steps above.
      placeholder: Drop the image here.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Which build are you on?
      description: |
        Open **Settings** in the app (the ⚙️ in the top right) and scroll to
        the bottom — the version is the last line, in the form
        "Version X.X.X (build N)". Copy it exactly.

        Leave this empty if you just installed the APK we sent you — we'll
        assume you're on the latest build.
      placeholder: Latest
    validations:
      required: false

  - type: dropdown
    id: device
    attributes:
      label: Which phone is this on?
      options:
        - Pixel 7 Pro
        - Pixel 10
        - Samsung Galaxy S24
        - Another phone (say which one in "Anything else?" at the bottom)
    validations:
      required: true

  - type: dropdown
    id: android-version
    attributes:
      label: Android version
      description: |
        Find it in your phone's **Settings → About phone**. If you picked
        "another phone" above, say which model in the box at the bottom.
      default: 0
      options:
        - Android 16
        - Android 15
        - Android 14
        - Android 13 or older
        - Not sure
    validations:
      required: false

  - type: dropdown
    id: reproducible
    attributes:
      label: Does it happen every time?
      options:
        - Every time
        - Sometimes
        - It happened once and I can't repeat it
    validations:
      required: true

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: |
        Optional. Anything that felt relevant — including any phone settings
        you've changed that might affect how the app looks or behaves.
      placeholder: |
        Anything that felt relevant, for example:

        - Phone settings you've changed — text size, display size, bold text,
          dark mode, battery saver, a different system language. Settings like
          these change how every app looks, so they're worth mentioning.
        - Which phone, if you picked "another phone" above.
        - I was on mobile data, not wifi.
        - I'd just switched household.
        - The app had been open in the background for a while.
    validations:
      required: false
