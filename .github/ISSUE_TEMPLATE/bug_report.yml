name: 🐞 Bug report
description: Something in the app is broken, wrong, or crashed.
title: "[Bug] "
labels: ["bug", "from-tester"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing! The more of this you fill in, the less likely we
        have to come back and ask you to reproduce it again.

        **The single most useful thing you can add is a screenshot.**

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem in your own words.
      placeholder: I tapped the Search tab and nothing happened at all.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How do we make it happen again?
      description: |
        Step by step, from opening the app. Even if it feels obvious — the
        exact order often turns out to be the thing that matters.
      placeholder: |
        1. Open the app (already signed in)
        2. Tap the Storage tab at the bottom
        3. Tap the "Fridge" card
        4. Tap the ⚙️ in the top right
        5. Screen goes blank
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect instead?
      placeholder: I expected the Settings screen to open.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or screen recording
      description: |
        **Required.** Drag an image or video straight into this box, or tap
        it and pick from your gallery.

        On Android: hold **Power + Volume Down** for a screenshot. For a
        recording, swipe down twice and tap **Screen record**.

        If the app crashed and closed before you could capture it, write
        "crashed, no screenshot" here and tell us exactly what you were doing
        in the steps above.
      placeholder: Drop the image here.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Which build are you on?
      description: |
        Open **Settings** in the app (the ⚙️ in the top right) and scroll to
        the bottom — the version is the last line. Copy it exactly.
      placeholder: Version 0.1.6 (build 7)
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Which phone is this on?
      options:
        - Pixel 7 Pro
        - Pixel 10
        - Samsung Galaxy S24
        - Another phone (say which one below)
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      description: |
        Find it in your phone's **Settings → About phone**. If you picked
        "another phone" above, put the model here too.
      placeholder: Android 16
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ### How this phone's text is set up

        Android has settings that change how **every** app looks — how heavy the
        text is, how big everything is. Two phones with different settings will
        render the app differently even on the same build, and that has already
        sent us chasing a bug that was never in the app (#32).

        Quickest way to find these: open **Settings**, use the **search box at
        the top**, and type **bold** or **font size**.

  - type: dropdown
    id: bold-text
    attributes:
      label: Is "Bold text" turned on for this phone?
      description: |
        **Pixel:** Settings → Accessibility → Display size and text → **Bold text**
        **Samsung:** Settings → Display → Font size and style → **Bold font**
      options:
        - "No — it's off"
        - "Yes — it's on"
        - Not sure
    validations:
      required: true

  - type: input
    id: text-size
    attributes:
      label: Font size and display size
      description: |
        **Pixel:** Settings → Accessibility → Display size and text — the
        **Font size** and **Display size** sliders.
        **Samsung:** Settings → Display → **Font size and style**, and
        Settings → Display → **Screen zoom**.

        "Default" is a perfectly good answer if you've never touched them.
      placeholder: "Font size: default. Display size: one step larger."
    validations:
      required: false

  - type: textarea
    id: comparing-phones
    attributes:
      label: Comparing two phones?
      description: |
        Only if this report is about the app looking or behaving **differently
        on two phones**. Tell us which screenshot came from which phone — and
        please fill in the "Bold text" and font/display size answers above for
        **both** of them, since a difference between phones is usually a
        difference between these settings.
      placeholder: |
        First screenshot: Galaxy S24 — Bold text ON, font size default.
        Second screenshot: Pixel 7 Pro — Bold text off, font size default.
    validations:
      required: false

  - type: dropdown
    id: reproducible
    attributes:
      label: Does it happen every time?
      options:
        - Every time
        - Sometimes
        - It happened once and I can't repeat it
    validations:
      required: true

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: |
        Optional. Anything that felt relevant — e.g. you were on mobile data
        rather than wifi, you'd just switched household, the app had been
        open in the background a while.
    validations:
      required: false
