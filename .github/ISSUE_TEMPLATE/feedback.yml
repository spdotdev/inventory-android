name: 💡 Feedback or idea
description: Something works, but it's awkward, confusing, or missing.
title: "[Feedback] "
labels: ["feedback", "from-tester"]
body:
  - type: markdown
    attributes:
      value: |
        ☝️ **Keep that title short** — a few words we can spot it by. Your idea
        goes in the boxes below, not up there.

        Not a bug — just something that felt wrong, slow, confusing, or that
        you wished the app did. This is genuinely useful; send it.

  - type: textarea
    id: feedback
    attributes:
      label: What's on your mind?
      description: |
        What were you trying to do, and what got in the way? **Write as much
        detail as you can** — there is no such thing as too much here. Spell it
        out even if it feels obvious: which screen you were on, what you
        tapped, what you saw. A sentence we can act on beats one we have to
        come back and ask about.
      placeholder: |
        I keep tapping where the old side menu used to be to switch
        households. It took me a while to find the Households tab.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: What would you like it to do instead?
      description: |
        Your actual idea — this is the box for it. Even a rough one is fine,
        and "I don't know, but the current way doesn't work for me" is a valid
        answer. Please don't leave this to the title.
      placeholder: |
        Give each household its own colour on the Dashboard, so I can tell at
        a glance which card belongs to which.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: |
        Optional, but a picture of the screen you're talking about saves a
        lot of back-and-forth. Drag it into this box.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Which build are you on?
      description: |
        Open **Settings** in the app (the ⚙️ in the top right) and scroll to
        the bottom — the version is the last line, in the form
        "Version X.X.X (build N)". Copy it exactly.

        Leave this empty if you just installed the APK we sent you — we'll
        assume you're on the latest build.
      placeholder: Latest
    validations:
      required: false
