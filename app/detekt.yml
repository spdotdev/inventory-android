# Project overrides on top of detekt's defaults (buildUponDefaultConfig=true).
# Compose exemptions follow the official detekt-for-Compose guidance: composables
# are declarative UI trees, so PascalCase naming and method-size/parameter-count
# metrics don't apply to them.
naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
complexity:
  LongParameterList:
    ignoreAnnotated: ['Composable']
  LongMethod:
    ignoreAnnotated: ['Composable']
  CyclomaticComplexMethod:
    ignoreAnnotated: ['Composable']
style:
  MagicNumber:
    # Named top-level/property constants (e.g. Color(0xFFE53935)) are the fix
    # for magic numbers, not an instance of them.
    ignorePropertyDeclaration: true
